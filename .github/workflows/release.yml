name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        run: |
          # Exchange GitHub OIDC token for crates.io publish token
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=crates.io" | jq -r '.value')

          CRATES_TOKEN=$(curl -sS \
            -X PUT \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            "https://crates.io/api/v1/tokens/trusted-publishing" | jq -r '.token')

          CARGO_REGISTRY_TOKEN="$CRATES_TOKEN" cargo publish
